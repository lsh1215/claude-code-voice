name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  readme-sync:
    name: README Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all README variants exist
        run: |
          ERRORS=0
          for lang in "" ".ko" ".ja" ".zh"; do
            FILE="README${lang}.md"
            if [ ! -f "$FILE" ]; then
              echo "::error::Missing ${FILE}"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ ${FILE} exists"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi

  project-structure:
    name: Project Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          ERRORS=0
          REQUIRED_FILES=(
            "PRD.md"
            "README.md"
            ".gitignore"
          )
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required file: ${file}"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ ${file} exists"
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi
